<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Files/style.css">
    <title>LocalStorage-Auth</title>
</head>
<body>

    <!--Total container-->
    <div id="container">
        <img alt="background" id="background" src="Files/wallpaper.jpg" >

        <!--Auth container-->
        <div id="containerAuth">
            <h2>Create an account</h2>

            <hr id="mainDivider">

            <!--Create an account-->
            <input maxlength="20" id="nameInput" placeholder="Name" type="text" class="input">
            <input id="emailInput" placeholder="Email" type="text" class="input">
            <div id="containerInputPassword">
                <input id="inputPassword" placeholder="Password" type="password" class="input">

                <img class="hide eye" id="openEye" src="Files/view.png">
                <img class="eye" id="closeEye" src="Files/close-eye.png">
            </div>

            <button id="buttonCreate">Create account</button>

            <!--Or Register with-->
            <div id="register">
                <hr class="text-divider">
                <p id="text">Or Register with</p>
                <hr class="text-divider">
            </div>

            <div class="containerButtonsRegister">
                <button class="buttonsRegister"><img class="social-icon" src="Files/google-symbol.png">Google</button>
                <button class="buttonsRegister"><img class="social-icon" src="Files/github.png">GitHub</button>
            </div>
            
            <p id="question-login">Already have an account? <a href="login/login.html">Login</a></p>
        </div>

    </div>
<script src="Files/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <title>LocalStorage-Auth</title>
</head>
<body>

    <!--Total container-->
    <div id="container">
        <img id="background" src="wallpaperflare.com_wallpaper (2).jpg">

        <!--Auth container-->
        <div id="containerAuth">
            <h2>Create an account</h2>

            <hr id="mainDivider">

            <!--Create an account-->
            <input placeholder="Name" type="text" class="input">
            <input placeholder="Email" type="email" class="input">
            <div id="containerInputPassword">
                <input id="inputPassword" placeholder="Password" type="password" class="input">
                <img class="eye" id="openEye" src="view.png">
                <img class="eye" id="closeEye" src="close-eye.png">
            </div>

            <button id="buttonCreate">Create account</button>

            <!--Or Register with-->
            <div id="register">
                <hr class="text-divider">
                <p id="text">Or Register with</p>
                <hr class="text-divider">
            </div>

            <div class="containerButtonsRegister">
                <button class="buttonsRegister"><img class="social-icon" src="google-symbol.png">Google</button>
                <button class="buttonsRegister"><img class="social-icon" src="github.png">GitHub</button>
            </div>

            <p id="question-login">Already have an account? <a href="">Log in</a></p>
        </div>

    </div>

</body>
</html>
